version: "1"

port: 2222
external_ssh_port: 22
http_port: 8080
metrics_port: 0
default_cwd: /

auth_file: ./lore.json
data_dir: ./data

# Disk-backed lore is overlaid at the virtual root. Its directory hierarchy is
# the namespace; lore.json independently defines docsets and authorization.
writable_dir: ./published

# Global write lock. The substrate boots read-only by default; set false to
# enable the experimental writable substrate so authenticated identities can
# create/overwrite files within their writable docsets (per-identity/per-docset
# scoping still applies on top of this).
readonly: false

# How whole-file overwrites (>, tee, sed -i, publish) defend against concurrent
# writers. "hash" (the default) makes them compare-and-swap: a write that would
# clobber a change made since the file was read is rejected. "last_write_wins"
# makes overwrites unconditional. Append (>>) and patch are always CAS. Can be
# overridden per docset via write_conflict_policy in lore.json.
write_conflict_policy: hash

# Max concurrent async `spawn` jobs. The `spawn` command (granted only to
# identities holding the "spawn" capability) runs an external command and writes
# its output back into the lore in a background goroutine; this bounds how many
# run at once. In-flight jobs are in-memory and lost on restart (drained briefly
# on shutdown). Default 8.
max_jobs: 8

mcp:
  enabled: true
  path: /mcp

passkeys:
  enabled: true
  rp_id: openlore.sh
  rp_name: OpenLore
  rp_origins:
    - https://openlore.sh
  lore_path: /lore
  passkeys_file: ./config/passkeys.json
  session_ttl: 24h

# Bearer-token auth for the MCP + HTTP API. Server infrastructure (how this
# instance mints/verifies tokens), so it lives here, not in lore.json. Enabling
# it mounts the OAuth flow (/authorize, /oauth/token), Dynamic Client
# Registration (/register), and discovery (/.well-known/oauth-*), so OAuth-native
# MCP clients (Claude Desktop, Cowork) can log in — while posture (public vs
# token-required) still derives from lore.json's allow_keyless/unknown_identity.
# The ES256 signing key is generated on first boot under <data_dir>/auth/.
tokens:
  issuer: https://openlore.sh
  audience: https://openlore.sh
  access_ttl: 30m
  refresh_ttl: 720h
