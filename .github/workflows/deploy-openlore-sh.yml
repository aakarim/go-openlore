name: Deploy openlore.sh

on:
  push:
    branches: [main]
    paths:
      - 'openlore.sh/**'
      - 'assets/**'
      - 'pkg/**'
      - 'internal/**'
      - 'cmd/**'
  workflow_dispatch:

# Required secrets:
#   DEPLOY_SSH_KEY - Private SSH key for the deploy user (authorized on the droplet)
#   DEPLOY_HOST    - Droplet host to deploy to
#   DEPLOY_USER    - Deploy user (openlore)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Embed docs, config, and skills
        run: |
          rm -rf assets/lore/*
          cp -r openlore.sh/docs/* assets/lore/
          cp openlore.sh/openlore.yml assets/config/openlore.yml
          cp openlore.sh/motd.txt assets/config/motd.txt
          cp -r openlore.sh/skills/* assets/skills/

      - name: Build (linux/amd64)
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o openlore ./cmd/openlore

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload binary
        run: |
          scp -i ~/.ssh/deploy_key openlore \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/openlore"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            set -euo pipefail
            sudo systemctl stop openlore
            cp /tmp/openlore /opt/openlore/openlore
            chmod +x /opt/openlore/openlore
            mkdir -p /opt/openlore/published /opt/openlore/config
            sudo systemctl start openlore
            sleep 2
            sudo systemctl is-active openlore
          '

      - name: Verify
        run: |
          sleep 3
          curl -fsS -o /dev/null -w "openlore.sh -> HTTP %{http_code}\n" https://openlore.sh/
