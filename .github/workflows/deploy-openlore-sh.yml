name: Deploy openlore.sh

on:
  push:
    branches: [main]
    paths:
      - 'openlore.sh/**'
      - 'assets/**'
      - 'pkg/**'
      - 'internal/**'
      - 'cmd/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to App Platform
        run: |
          doctl apps create-deployment $(doctl apps list --format ID --no-header | head -1)
