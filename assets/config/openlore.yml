version: "1"

port: 2222
external_ssh_port: 22
http_port: 8080
metrics_port: 0
default_cwd: /

auth_file: ./lore.json
data_dir: ./data

# How whole-file overwrites (>, tee, sed -i, publish) defend against concurrent
# writers. "hash" (the default) makes them compare-and-swap: a write that would
# clobber a change made since the file was read is rejected. "last_write_wins"
# makes overwrites unconditional. Append (>>) and patch are always CAS. Can be
# overridden per docset via write_conflict_policy in lore.json.
write_conflict_policy: hash

# Max concurrent async `spawn` jobs. The `spawn` command (granted only to
# identities holding the "spawn" capability) runs an external command and writes
# its output back into the lore in a background goroutine; this bounds how many
# run at once. In-flight jobs are in-memory and lost on restart (drained briefly
# on shutdown). Default 8.
max_jobs: 8

mcp:
  enabled: true
  path: /mcp

passkeys:
  enabled: true
  rp_id: openlore.sh
  rp_name: OpenLore
  rp_origins:
    - https://openlore.sh
  lore_path: /lore
  passkeys_file: ./config/passkeys.json
  session_ttl: 24h

folders:
  - name: knowledge
    path: ./published/knowledge
  - name: jared
    path: ./published/jared
  - name: claw
    path: ./published/claw
  - name: cor
    path: ./published/cor
  - name: ray
    path: ./published/ray
  - name: razer
    path: ./published/razer
